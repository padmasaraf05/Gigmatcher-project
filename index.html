<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!--
      viewport-fit=cover: lets the app extend into iPhone notch/home-bar area
      so the UI fills the full screen like a native app.
    -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- ─── PWA: Theme colour (Android chrome bar + task switcher) ──────── -->
    <meta name="theme-color" content="#2563EB" />

    <!-- ─── iOS PWA meta tags ───────────────────────────────────────────── -->
    <!--
      apple-mobile-web-app-capable: hides Safari UI when launched from home screen.
      Without this, iOS shows the full browser chrome even in standalone mode.
    -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <!--
      default = white status bar (readable on our blue header).
      Options: "default" | "black" | "black-translucent"
    -->
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <!-- Name shown below the icon on the home screen -->
    <meta name="apple-mobile-web-app-title" content="GigMatcher" />
    <!-- Icon iOS uses when adding to home screen (Safari ignores manifest icons) -->
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />

    <!-- ─── Android / Generic ───────────────────────────────────────────── -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="GigMatcher" />

    <!-- ─── Favicon ─────────────────────────────────────────────────────── -->
    <link rel="icon" type="image/png" sizes="96x96" href="/icons/icon-96.png" />
    <link rel="icon" type="image/png" sizes="72x72" href="/icons/icon-72.png" />

    <!-- ─── SEO ──────────────────────────────────────────────────────────── -->
    <title>GigMatcher — Find Gig Workers Near You</title>
    <meta
      name="description"
      content="Connect with skilled gig workers near you — plumbers, electricians, carpenters and more. Instant booking, verified workers."
    />

    <!--
      NOTE: vite-plugin-pwa (registerType: "autoUpdate") automatically:
        - Injects <link rel="manifest" href="/manifest.webmanifest" /> at build time
        - Registers and auto-updates the Workbox service worker
        - Handles the SW registration script
      Do NOT add those manually here — it would create duplicates.
    -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
